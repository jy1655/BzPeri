name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure service with...
        2. Start server with...
        3. Connect from client...
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: bzperi-version
    attributes:
      label: BzPeri Version
      description: Version of BzPeri (e.g., 0.1.9)
      placeholder: "0.1.9"
    validations:
      required: true

  - type: input
    id: bluez-version
    attributes:
      label: BlueZ Version
      description: "Run: bluetoothctl --version"
      placeholder: "5.77"
    validations:
      required: true

  - type: dropdown
    id: linux-distro
    attributes:
      label: Linux Distribution
      options:
        - Ubuntu 24.04
        - Ubuntu 22.04
        - Debian 12 (Bookworm)
        - Debian 11 (Bullseye)
        - Raspberry Pi OS (64-bit)
        - Fedora
        - Arch Linux
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - amd64 (x86_64)
        - arm64 (aarch64)
        - armhf
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: |
        Run with debug mode enabled: `sudo ./bzp-standalone -d`
        Paste relevant log output here.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
